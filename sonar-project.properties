# Identification unique du projet
sonar.projectKey=ticketing-backend
sonar.projectName=Ticketing API (NestJS)
sonar.projectVersion=1.0

# Indiquer explicitement la branche de travail (nécessaire si différente de main/master en version Community)
sonar.branch.name=develop

# Répertoire contenant le code source à analyser
sonar.sources=src

# Fichiers et dossiers à IGNORER lors de l'analyse principale (fichiers générés, configurations, tests)
sonar.exclusions=src/**/*.spec.ts, src/main.ts, src/**/*.module.ts, src/core/guards/**

# Configuration spécifique pour TypeScript/JavaScript
sonar.language=ts
sonar.sourceEncoding=UTF-8

# Chemin vers le rapport de couverture de code généré par Jest
sonar.javascript.lcov.reportPaths=coverage/lcov.info